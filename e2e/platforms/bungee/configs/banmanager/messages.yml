# BanManager messages overrides for WebEnhancer E2E testing.
# Only the ban / tempban / banip / tempbanip kick + disallowed templates are
# overridden so the WebEnhancer pin feature can substitute <pin>. All other
# message keys fall through to BanManager v8's bundled defaults.
#
# Templates use MiniMessage syntax: https://docs.advntr.dev/minimessage/format.html

messages:
  ban:
    player:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason><gold>. Your appeal pin is <pin>'
      kick: '<gold>You have been banned permanently for <dark_red><reason><gold>. Your appeal pin is <pin>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'

  tempban:
    player:
      disallowed: '<gold>You have been temporarily banned from this server for <dark_red><reason>\n<gold>It expires in <expires>. Your appeal pin is <pin>'
      kick: '<gold>You have been temporarily banned for <dark_red><reason><gold>. Your appeal pin is <pin>'
      dateTimeFormat: 'yyyy-MM-dd HH:mm:ss'

  banip:
    ip:
      disallowed: '<gold>You have been banned from this server for <dark_red><reason><gold>. Your appeal pin is <pin>'
      kick: '<gold>You have been banned permanently for <dark_red><reason>'

  tempbanip:
    ip:
      disallowed: '<gold>You have been temporarily banned from this server for <dark_red><reason>\n<gold>It expires in <expires>. Your appeal pin is <pin>'
      kick: '<gold>You have been temporarily banned for <dark_red><reason>'
